# Campaign R1: Core High-Yield Pack
# 10 cases focused on capability boundaries and precondition sensitivity

templates:
  # ========================================
  # CAPABILITY BOUNDARY CASES (6 cases)
  # Primary high-yield: parameter contract violations
  # ========================================

  - template_id: cb-bound-001
    operation: create_collection
    param_template:
      collection_name: "test_r1_dim_zero"
      dimension: 0  # Invalid: min_value=1
      metric_type: "L2"
    expected_validity: illegal
    required_preconditions: []
    oracle_refs: []
    rationale: "Invalid collection creation with zero dimension - should fail with diagnostic error"

  - template_id: cb-bound-002
    operation: search
    param_template:
      collection_name: "{collection}"
      vector: "{query_vector}"
      top_k: -1  # Invalid: negative value
    expected_validity: illegal
    required_preconditions:
      - collection_exists
      - collection_loaded
    oracle_refs: []
    rationale: "Invalid search with negative top_k parameter - should fail with diagnostic error"

  - template_id: cb-bound-003
    operation: search
    param_template:
      collection_name: "{collection}"
      vector: "{query_vector}"
      top_k: 0  # Invalid: min_value=1
    expected_validity: illegal
    required_preconditions:
      - collection_exists
      - collection_loaded
    oracle_refs: []
    rationale: "Invalid search with zero top_k parameter - should fail with diagnostic error"

  - template_id: cb-bound-004
    operation: insert
    param_template:
      collection_name: "{collection}"
      vectors: "{vectors_128}"  # 128-dim vectors into 64-dim collection
    expected_validity: illegal
    required_preconditions:
      - collection_exists
    oracle_refs: []
    rationale: "Invalid insert with dimension mismatch - should fail with diagnostic error"

  - template_id: cb-bound-005
    operation: create_collection
    param_template:
      collection_name: "test_r1_invalid_metric"
      dimension: 128
      metric_type: "INVALID_METRIC"  # Invalid: not in [L2, IP, COSINE]
    expected_validity: illegal
    required_preconditions: []
    oracle_refs: []
    rationale: "Invalid metric type outside allowed values - should fail with diagnostic error"

  - template_id: cb-bound-006
    operation: create_collection
    param_template:
      collection_name: "{collection}"  # Duplicate: collection already exists
      dimension: 128
      metric_type: "L2"
    expected_validity: illegal
    required_preconditions:
      - collection_exists  # Collection already exists from setup
    oracle_refs: []
    rationale: "State boundary: create collection with duplicate name - should fail or return error"

  # ========================================
  # PRECONDITION CALIBRATION CASES (2 cases)
  # Expected: type-2.precondition_failed (gate validation)
  # ========================================

  - template_id: ps-cond-001
    operation: insert
    param_template:
      collection_name: "nonexistent_collection_r1"
      vectors: "{vectors}"
    expected_validity: legal  # Contract-valid but precondition-fail
    required_preconditions:
      - collection_exists
    oracle_refs: []
    rationale: "Precondition calibration: insert into nonexistent collection - should be filtered by precondition gate"

  - template_id: ps-cond-002
    operation: search
    param_template:
      collection_name: "{collection}"  # Exists but index not loaded
      vector: "{query_vector}"
      top_k: 10
    expected_validity: legal  # Contract-valid but precondition-fail
    required_preconditions:
      - collection_exists
      - collection_loaded
    oracle_refs: []
    rationale: "Precondition calibration: search before index load - should be filtered by precondition gate"

  # ========================================
  # EXPLORATORY CASES (2 cases)
  # Lower confidence: may be dialect/schema-dependent
  # ========================================

  - template_id: exp-001
    operation: search
    param_template:
      collection_name: "{collection}"  # Exists, loaded, but empty (no data)
      vector: "{query_vector}"
      top_k: 10
    expected_validity: legal
    required_preconditions:
      - collection_exists
      - collection_loaded
    oracle_refs: []
    rationale: "Exploratory: search on empty collection - may succeed (valid) or fail with poor diagnostics (Type-2)"

  - template_id: exp-002
    operation: filtered_search
    param_template:
      collection_name: "{collection}"
      vector: "{query_vector}"
      top_k: 10
      filter: "nonexistent_field > 100"  # Filter on non-scalar field
    expected_validity: illegal  # Likely invalid filter syntax
    required_preconditions:
      - collection_exists
      - collection_loaded
    oracle_refs: []
    rationale: "Exploratory: filter with non-scalar field reference - dialect-sensitive, lower confidence"
