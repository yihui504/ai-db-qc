# R5B Index Lifecycle Campaign Test Templates
# Version: 2.1
# Focus: State transition semantics, not ANN recall comparison

templates:
  # ========================================
  # ILC-001: Create Index State Transition
  # ========================================
  - template_id: ilc-001
    name: "Create Index State Transition"
    contract_id: "ILC-001"
    initial_state: "DATA_NO_INDEX"
    target_state: "INDEX_CREATED_UNLOADED"
    description: "create_index creates index metadata without loading collection"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
          metric_type: "L2"
      - step: 4
        operation: get_load_state
        param_template:
          collection_name: "{collection_name}"
        store_as: "state_after_create"
    oracle_expectation:
      classification: "PASS"
      check: "index_metadata_exists AND load_state == NotLoad"
    priority: "HIGH"

  # ========================================
  # ILC-002: Search Precondition Gate
  # ========================================
  - template_id: ilc-002
    name: "Search Precondition Gate (Unloaded)"
    contract_id: "ILC-002"
    initial_state: "INDEX_CREATED_UNLOADED"
    target_state: "INDEX_CREATED_UNLOADED"
    description: "search on unloaded collection fails predictably (precondition gate)"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 4
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 10
        store_as: "search_result_unloaded"
      - step: 5
        operation: get_load_state
        param_template:
          collection_name: "{collection_name}"
        store_as: "load_state_after_search"
    oracle_expectation:
      classification: "EXPECTED_FAILURE"
      check: "load_state == NotLoad AND (search_fails OR returns_empty)"
      reasoning: "Precondition gate violation (intentional test case)"
    priority: "HIGH"

  # ========================================
  # ILC-003: Load State Transition
  # ========================================
  - template_id: ilc-003
    name: "Load State Transition"
    contract_id: "ILC-003"
    initial_state: "INDEX_CREATED_UNLOADED"
    target_state: "INDEX_LOADED"
    description: "load loads collection into memory"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 4
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 5
        operation: get_load_state
        param_template:
          collection_name: "{collection_name}"
        store_as: "state_after_load"
    oracle_expectation:
      classification: "PASS"
      check: "load_state == Loaded"
    priority: "HIGH"

  # ========================================
  # ILC-004: Loaded Search Baseline
  # ========================================
  - template_id: ilc-004
    name: "Loaded Search Baseline"
    contract_id: "ILC-004"
    initial_state: "INDEX_LOADED"
    target_state: "INDEX_LOADED"
    description: "search on loaded collection succeeds (baseline for comparison)"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 4
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 5
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 10
        store_as: "baseline_results"
    oracle_expectation:
      classification: "PASS"
      check: "search_succeeds AND results_not_empty"
    priority: "HIGH"

  # ========================================
  # ILC-005: Release State Transition
  # ========================================
  - template_id: ilc-005
    name: "Release State Transition"
    contract_id: "ILC-005"
    initial_state: "INDEX_LOADED"
    target_state: "INDEX_RELEASED"
    description: "release unloads collection while preserving index metadata"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 4
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 5
        operation: count_entities
        param_template:
          collection_name: "{collection_name}"
        store_as: "count_before_release"
      - step: 6
        operation: release
        param_template:
          collection_name: "{collection_name}"
      - step: 7
        operation: get_load_state
        param_template:
          collection_name: "{collection_name}"
        store_as: "state_after_release"
      - step: 8
        operation: count_entities
        param_template:
          collection_name: "{collection_name}"
        store_as: "count_after_release"
    oracle_expectation:
      classification: "PASS"
      check: "index_metadata_exists AND load_state == NotLoad AND storage_count_unchanged"
      reasoning: "Release preserves metadata and data, unloads searchable state"
    priority: "HIGH"

  # ========================================
  # ILC-006: Reload After Release
  # ========================================
  - template_id: ilc-006
    name: "Reload After Release"
    contract_id: "ILC-006"
    initial_state: "INDEX_RELEASED"
    target_state: "INDEX_LOADED"
    entered_via: "reload_after_release"
    description: "reload restores searchable state with same data"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 4
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 5
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 10
        store_as: "results_pre_release"
      - step: 6
        operation: release
        param_template:
          collection_name: "{collection_name}"
      - step: 7
        operation: reload
        param_template:
          collection_name: "{collection_name}"
      - step: 8
        operation: get_load_state
        param_template:
          collection_name: "{collection_name}"
        store_as: "state_after_reload"
      - step: 9
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 10
        store_as: "results_post_reload"
    oracle_expectation:
      classification: "PASS"
      check: "load_state == Loaded AND results_match_pre_release_baseline"
      evidence:
        entered_via: "reload_after_release"
    priority: "HIGH"

  # ========================================
  # ILC-007: Drop Index Transition
  # ========================================
  - template_id: ilc-007
    name: "Drop Index Transition"
    contract_id: "ILC-007"
    initial_state: "INDEX_LOADED"
    target_state: "INDEX_DROPPED"
    description: "drop_index deletes index metadata (irreversible)"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 4
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 5
        operation: release
        param_template:
          collection_name: "{collection_name}"
      - step: 6
        operation: drop_index
        param_template:
          collection_name: "{collection_name}"
        store_as: "drop_result"
      - step: 7
        operation: get_load_state
        param_template:
          collection_name: "{collection_name}"
        store_as: "state_after_drop"
    oracle_expectation:
      classification: "PASS"
      check: "index_metadata_deleted AND load_state == NotLoad"
      evidence:
        irreversible: true
    priority: "HIGH"

  # ========================================
  # ILC-010: Documented NotLoad Behavior
  # ========================================
  - template_id: ilc-010
    name: "Documented NotLoad Behavior"
    contract_id: "ILC-010"
    initial_state: "COLLECTION_EMPTY_NO_DATA"
    target_state: "DATA_NO_INDEX"
    description: "create_collection without index results in NotLoad state (documented)"
    documented_behavior: true
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: get_load_state
        param_template:
          collection_name: "{collection_name}"
        store_as: "initial_load_state"
    oracle_expectation:
      classification: "PASS"
      check: "load_state == NotLoad AND index_metadata_not_exists"
      reasoning: "Documented behavior: newly created collection is NotLoad until explicitly loaded"
    priority: "MEDIUM"

  # ========================================
  # ILC-008: Post-Drop Search Semantics
  # ========================================
  - template_id: ilc-008
    name: "Post-Drop Search Semantics"
    contract_id: "ILC-008"
    initial_state: "INDEX_DROPPED"
    target_state: "OBSERVE"
    description: "Verify search behavior after drop_index (exploratory)"
    exploratory: true
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 4
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 5
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 5
        store_as: "search_before_drop"
      - step: 6
        operation: release
        param_template:
          collection_name: "{collection_name}"
      - step: 7
        operation: drop_index
        param_template:
          collection_name: "{collection_name}"
        store_as: "drop_result"
      - step: 8
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 9
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 5
        store_as: "search_after_drop"
      - step: 10
        operation: get_load_state
        param_template:
          collection_name: "{collection_name}"
        store_as: "state_final"
    oracle_expectation:
      classification: "VERSION_GUARDED"
      check: "observe_search_behavior_after_drop"
      reasoning: "Post-drop search behavior may vary by database version"
    priority: "HIGH"

  # ========================================
  # ILC-009: Post-Insert Visibility Investigation
  # ========================================
  - template_id: ilc-009
    name: "Post-Insert Visibility Investigation"
    contract_id: "ILC-009"
    initial_state: "INDEX_LOADED"
    target_state: "OBSERVE"
    description: "Investigate post-insert visibility with flush and wait window analysis"
    investigation: true
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
        store_as: "insert_initial_result"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 4
        operation: flush
        param_template:
          collection_name: "{collection_name}"
          async: false
        store_as: "flush_after_initial"
      - step: 5
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 6
        operation: count_entities
        param_template:
          collection_name: "{collection_name}"
        store_as: "count_baseline"
      - step: 7
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 5
        store_as: "search_baseline"
      - step: 8
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{query_vector_128}"
        store_as: "insert_new_vector_result"
      - step: 9
        operation: count_entities
        param_template:
          collection_name: "{collection_name}"
        store_as: "count_before_flush"
      - step: 10
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 5
        store_as: "search_before_flush"
      - step: 11
        operation: flush
        param_template:
          collection_name: "{collection_name}"
          async: false
        store_as: "flush_after_insert"
      - step: 12
        operation: count_entities
        param_template:
          collection_name: "{collection_name}"
        store_as: "count_after_flush"
      - step: 13
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 5
        store_as: "search_after_flush"
    oracle_expectation:
      classification: "EXPERIMENT_DESIGN_ISSUE"
      investigation_focus: "insert_visibility_with_flush"
      reasoning: "Flush establishes storage visibility, but current experiment does not yet conclusively determine search visibility timing"
    priority: "HIGH"

  # ========================================
  # ILC-009b: Post-Insert Search Timing (Exact Vector Match)
  # ========================================
  - template_id: ilc-009b
    name: "Post-Insert Search Timing Investigation"
    contract_id: "ILC-009b"
    initial_state: "INDEX_LOADED"
    target_state: "OBSERVE"
    description: "Precise search-visible timing measurement with exact vector match"
    investigation: true
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "{collection_name}"
          dimension: 128
      - step: 2
        operation: insert
        param_template:
          collection_name: "{collection_name}"
          vectors: "{vectors_128}"
      - step: 3
        operation: flush
        param_template:
          collection_name: "{collection_name}"
          async: false
      - step: 4
        operation: build_index
        param_template:
          collection_name: "{collection_name}"
          index_type: "HNSW"
      - step: 5
        operation: load
        param_template:
          collection_name: "{collection_name}"
      - step: 6
        operation: count_entities
        param_template:
          collection_name: "{collection_name}"
        store_as: "count_baseline"
      - step: 7
        operation: search
        param_template:
          collection_name: "{collection_name}"
          vector: "{query_vector_128}"
          top_k: 3
        store_as: "search_baseline"
      # Insert unique vector and use it as query (exact match)
      # 128-dimensional unique vector: [0.999, 0.998, ..., 0.872]
      - step: 8
        operation: insert_unique
        param_template:
          collection_name: "{collection_name}"
          vectors: "[[0.999, 0.998, 0.997, 0.996, 0.995, 0.994, 0.993, 0.992, 0.991, 0.99, 0.989, 0.988, 0.987, 0.986, 0.985, 0.984, 0.983, 0.982, 0.981, 0.98, 0.979, 0.978, 0.977, 0.976, 0.975, 0.974, 0.973, 0.972, 0.971, 0.97, 0.969, 0.968, 0.967, 0.966, 0.965, 0.964, 0.963, 0.962, 0.961, 0.96, 0.959, 0.958, 0.957, 0.956, 0.955, 0.954, 0.953, 0.952, 0.951, 0.95, 0.949, 0.948, 0.947, 0.946, 0.945, 0.944, 0.943, 0.942, 0.941, 0.94, 0.939, 0.938, 0.937, 0.936, 0.935, 0.934, 0.933, 0.932, 0.931, 0.93, 0.929, 0.928, 0.927, 0.926, 0.925, 0.924, 0.923, 0.922, 0.921, 0.92, 0.919, 0.918, 0.917, 0.916, 0.915, 0.914, 0.913, 0.912, 0.911, 0.91, 0.909, 0.908, 0.907, 0.906, 0.905, 0.904, 0.903, 0.902, 0.901, 0.9, 0.899, 0.898, 0.897, 0.896, 0.895, 0.894, 0.893, 0.892, 0.891, 0.89, 0.889, 0.888, 0.887, 0.886, 0.885, 0.884, 0.883, 0.882, 0.881, 0.88, 0.879, 0.878, 0.877, 0.876, 0.875, 0.874, 0.873, 0.872]]"
        store_as: "insert_result"
      # Immediate search after insert
      - step: 9
        operation: search_exact
        param_template:
          collection_name: "{collection_name}"
          vector: "[[0.999, 0.998, 0.997, 0.996, 0.995, 0.994, 0.993, 0.992, 0.991, 0.99, 0.989, 0.988, 0.987, 0.986, 0.985, 0.984, 0.983, 0.982, 0.981, 0.98, 0.979, 0.978, 0.977, 0.976, 0.975, 0.974, 0.973, 0.972, 0.971, 0.97, 0.969, 0.968, 0.967, 0.966, 0.965, 0.964, 0.963, 0.962, 0.961, 0.96, 0.959, 0.958, 0.957, 0.956, 0.955, 0.954, 0.953, 0.952, 0.951, 0.95, 0.949, 0.948, 0.947, 0.946, 0.945, 0.944, 0.943, 0.942, 0.941, 0.94, 0.939, 0.938, 0.937, 0.936, 0.935, 0.934, 0.933, 0.932, 0.931, 0.93, 0.929, 0.928, 0.927, 0.926, 0.925, 0.924, 0.923, 0.922, 0.921, 0.92, 0.919, 0.918, 0.917, 0.916, 0.915, 0.914, 0.913, 0.912, 0.911, 0.91, 0.909, 0.908, 0.907, 0.906, 0.905, 0.904, 0.903, 0.902, 0.901, 0.9, 0.899, 0.898, 0.897, 0.896, 0.895, 0.894, 0.893, 0.892, 0.891, 0.89, 0.889, 0.888, 0.887, 0.886, 0.885, 0.884, 0.883, 0.882, 0.881, 0.88, 0.879, 0.878, 0.877, 0.876, 0.875, 0.874, 0.873, 0.872]]"
          top_k: 1
        store_as: "search_immediate"
      - step: 10
        operation: count_entities
        param_template:
          collection_name: "{collection_name}"
        store_as: "count_before_flush"
      # After flush
      - step: 11
        operation: flush
        param_template:
          collection_name: "{collection_name}"
          async: false
      - step: 12
        operation: count_entities
        param_template:
          collection_name: "{collection_name}"
        store_as: "count_after_flush"
      - step: 13
        operation: search_exact
        param_template:
          collection_name: "{collection_name}"
          vector: "[[0.999, 0.998, 0.997, 0.996, 0.995, 0.994, 0.993, 0.992, 0.991, 0.99, 0.989, 0.988, 0.987, 0.986, 0.985, 0.984, 0.983, 0.982, 0.981, 0.98, 0.979, 0.978, 0.977, 0.976, 0.975, 0.974, 0.973, 0.972, 0.971, 0.97, 0.969, 0.968, 0.967, 0.966, 0.965, 0.964, 0.963, 0.962, 0.961, 0.96, 0.959, 0.958, 0.957, 0.956, 0.955, 0.954, 0.953, 0.952, 0.951, 0.95, 0.949, 0.948, 0.947, 0.946, 0.945, 0.944, 0.943, 0.942, 0.941, 0.94, 0.939, 0.938, 0.937, 0.936, 0.935, 0.934, 0.933, 0.932, 0.931, 0.93, 0.929, 0.928, 0.927, 0.926, 0.925, 0.924, 0.923, 0.922, 0.921, 0.92, 0.919, 0.918, 0.917, 0.916, 0.915, 0.914, 0.913, 0.912, 0.911, 0.91, 0.909, 0.908, 0.907, 0.906, 0.905, 0.904, 0.903, 0.902, 0.901, 0.9, 0.899, 0.898, 0.897, 0.896, 0.895, 0.894, 0.893, 0.892, 0.891, 0.89, 0.889, 0.888, 0.887, 0.886, 0.885, 0.884, 0.883, 0.882, 0.881, 0.88, 0.879, 0.878, 0.877, 0.876, 0.875, 0.874, 0.873, 0.872]]"
          top_k: 1
        store_as: "search_after_flush"
      # After 200ms wait
      - step: 14
        operation: wait
        param_template:
          duration_ms: 200
      - step: 15
        operation: search_exact
        param_template:
          collection_name: "{collection_name}"
          vector: "[[0.999, 0.998, 0.997, 0.996, 0.995, 0.994, 0.993, 0.992, 0.991, 0.99, 0.989, 0.988, 0.987, 0.986, 0.985, 0.984, 0.983, 0.982, 0.981, 0.98, 0.979, 0.978, 0.977, 0.976, 0.975, 0.974, 0.973, 0.972, 0.971, 0.97, 0.969, 0.968, 0.967, 0.966, 0.965, 0.964, 0.963, 0.962, 0.961, 0.96, 0.959, 0.958, 0.957, 0.956, 0.955, 0.954, 0.953, 0.952, 0.951, 0.95, 0.949, 0.948, 0.947, 0.946, 0.945, 0.944, 0.943, 0.942, 0.941, 0.94, 0.939, 0.938, 0.937, 0.936, 0.935, 0.934, 0.933, 0.932, 0.931, 0.93, 0.929, 0.928, 0.927, 0.926, 0.925, 0.924, 0.923, 0.922, 0.921, 0.92, 0.919, 0.918, 0.917, 0.916, 0.915, 0.914, 0.913, 0.912, 0.911, 0.91, 0.909, 0.908, 0.907, 0.906, 0.905, 0.904, 0.903, 0.902, 0.901, 0.9, 0.899, 0.898, 0.897, 0.896, 0.895, 0.894, 0.893, 0.892, 0.891, 0.89, 0.889, 0.888, 0.887, 0.886, 0.885, 0.884, 0.883, 0.882, 0.881, 0.88, 0.879, 0.878, 0.877, 0.876, 0.875, 0.874, 0.873, 0.872]]"
          top_k: 1
        store_as: "search_200ms"
