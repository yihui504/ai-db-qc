# Campaign R3: Sequence and State-Based Testing
# 11 cases focused on state transitions, idempotency, and data visibility

# Note: These are sequence templates. Each step will be executed in order.
# The template structure supports multi-step sequences.

templates:
  # ========================================
  # PRIMARY CASES (6 cases)
  # State-transition and idempotency tests
  # ========================================

  - template_id: seq-001
    name: "Duplicate Delete Idempotency"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_seq001"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "test_r3_seq001"
          vectors: "{vectors_128}"
      - step: 3
        operation: search
        param_template:
          collection_name: "test_r3_seq001"
          vector: "{query_vector_128}"
          top_k: 10
      - step: 4
        operation: delete
        param_template:
          collection_name: "test_r3_seq001"
          ids: "[0]"
      - step: 5
        operation: delete
        param_template:
          collection_name: "test_r3_seq001"
          ids: "[0]"
        expected_behavior: "Should be idempotent - second delete should not error"
    type: primary
    state_property: "Delete idempotency"
    rationale: "Tests whether delete operation is idempotent - calling delete twice on same entity should not error"

  - template_id: seq-002
    name: "Search Without Index"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_seq002"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "test_r3_seq002"
          vectors: "{vectors_128}"
      - step: 3
        operation: search
        param_template:
          collection_name: "test_r3_seq002"
          vector: "{query_vector_128}"
          top_k: 10
        expected_behavior: "Should work (brute force) or fail predictably without index"
      - step: 4
        operation: build_index
        param_template:
          collection_name: "test_r3_seq002"
          index_type: "IVF_FLAT"
          metric_type: "L2"
      - step: 5
        operation: search
        param_template:
          collection_name: "test_r3_seq002"
          vector: "{query_vector_128}"
          top_k: 10
        expected_behavior: "Should work with index"
    type: primary
    state_property: "Index state dependency"
    rationale: "Tests whether searching unindexed collection works or fails appropriately"

  - template_id: seq-003
    name: "Deleted Entity Search"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_seq003"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "test_r3_seq003"
          vectors: "{vectors_128}"
      - step: 3
        operation: search
        param_template:
          collection_name: "test_r3_seq003"
          vector: "{query_vector_128}"
          top_k: 10
      - step: 4
        operation: delete
        param_template:
          collection_name: "test_r3_seq003"
          ids: "[0]"
      - step: 5
        operation: search
        param_template:
          collection_name: "test_r3_seq003"
          vector: "{query_vector_128}"
          top_k: 10
        expected_behavior: "Deleted entity should NOT appear in search results"
    type: primary
    state_property: "Deleted entity visibility"
    rationale: "Tests whether deleted entity correctly disappears from search results"

  - template_id: seq-004
    name: "Search After Drop"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_seq004"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "test_r3_seq004"
          vectors: "{vectors_128}"
      - step: 3
        operation: search
        param_template:
          collection_name: "test_r3_seq004"
          vector: "{query_vector_128}"
          top_k: 10
      - step: 4
        operation: drop_collection
        param_template:
          collection_name: "test_r3_seq004"
      - step: 5
        operation: search
        param_template:
          collection_name: "test_r3_seq004"
          vector: "{query_vector_128}"
          top_k: 10
        expected_behavior: "Should fail with appropriate error - collection no longer exists"
    type: primary
    state_property: "Post-drop state bug"
    rationale: "Tests whether searching dropped collection properly fails or has stale state bug"

  - template_id: seq-005
    name: "Load-Insert-Search Visibility"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_seq005"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: load
        param_template:
          collection_name: "test_r3_seq005"
      - step: 3
        operation: insert
        param_template:
          collection_name: "test_r3_seq005"
          vectors: "{vectors_128}"
      - step: 4
        operation: search
        param_template:
          collection_name: "test_r3_seq005"
          vector: "{query_vector_128}"
          top_k: 10
        expected_behavior: "Data inserted after load should be immediately searchable"
    type: primary
    state_property: "Load-insert-search visibility"
    rationale: "Tests whether data inserted after loading is immediately visible to search"

  - template_id: seq-006
    name: "Multi-Delete State Consistency"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_seq006"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "test_r3_seq006"
          vectors: "{vectors_multi}"
      - step: 3
        operation: delete
        param_template:
          collection_name: "test_r3_seq006"
          ids: "[0, 1]"
      - step: 4
        operation: delete
        param_template:
          collection_name: "test_r3_seq006"
          ids: "[2]"
      - step: 5
        operation: search
        param_template:
          collection_name: "test_r3_seq006"
          vector: "{query_vector_128}"
          top_k: 10
        expected_behavior: "Should return no results - all entities deleted"
    type: primary
    state_property: "Multi-delete state consistency"
    rationale: "Tests whether multiple delete operations maintain correct cumulative state"

  # ========================================
  # CALIBRATION CASES (3 cases)
  # Known-good paths and documented behavior
  # ========================================

  - template_id: cal-seq-001
    name: "Known-Good Full Lifecycle"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_cal001"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "test_r3_cal001"
          vectors: "{vectors_128}"
      - step: 3
        operation: build_index
        param_template:
          collection_name: "test_r3_cal001"
          index_type: "IVF_FLAT"
          metric_type: "L2"
      - step: 4
        operation: load
        param_template:
          collection_name: "test_r3_cal001"
      - step: 5
        operation: search
        param_template:
          collection_name: "test_r3_cal001"
          vector: "{query_vector_128}"
          top_k: 10
      - step: 6
        operation: drop_collection
        param_template:
          collection_name: "test_r3_cal001"
    type: calibration
    state_property: "Known-good full lifecycle"
    rationale: "Validates the documented good-path workflow: create, insert, build_index, load, search, drop"

  - template_id: cal-seq-002
    name: "Duplicate Creation Idempotency (Documented Behavior)"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_cal002"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "test_r3_cal002"
          vectors: "{vectors_128}"
      - step: 3
        operation: create_collection
        param_template:
          collection_name: "test_r3_cal002"
          dimension: 128
          metric_type: "L2"
        expected_behavior: "Should error consistently or handle gracefully (documented pymilvus behavior)"
      - step: 4
        operation: drop_collection
        param_template:
          collection_name: "test_r3_cal002"
    type: calibration
    state_property: "Duplicate creation documented behavior"
    rationale: "Verifies documented pymilvus behavior for duplicate collection creation"

  - template_id: cal-seq-003
    name: "Basic Insert-Search"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_cal003"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: insert
        param_template:
          collection_name: "test_r3_cal003"
          vectors: "{vectors_128}"
      - step: 3
        operation: search
        param_template:
          collection_name: "test_r3_cal003"
          vector: "{query_vector_128}"
          top_k: 10
      - step: 4
        operation: drop_collection
        param_template:
          collection_name: "test_r3_cal003"
    type: calibration
    state_property: "Basic insert-search"
    rationale: "Minimal viable workflow - create, insert, search, drop"

  # ========================================
  # EXPLORATORY CASES (2 cases)
  # Edge cases with uncertain expected behavior
  # ========================================

  - template_id: exp-seq-001
    name: "Empty Collection Search"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_exp001"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: search
        param_template:
          collection_name: "test_r3_exp001"
          vector: "{query_vector_128}"
          top_k: 10
        expected_behavior: "Uncertain - may return empty, error, or auto-create index"
      - step: 3
        operation: drop_collection
        param_template:
          collection_name: "test_r3_exp001"
    type: exploratory
    state_property: "Empty collection edge case"
    rationale: "Tests edge case: searching empty collection with no data and no index"

  - template_id: exp-seq-002
    name: "Delete Non-Existent Entity"
    sequence:
      - step: 1
        operation: create_collection
        param_template:
          collection_name: "test_r3_exp002"
          dimension: 128
          metric_type: "L2"
      - step: 2
        operation: delete
        param_template:
          collection_name: "test_r3_exp002"
          ids: "[999]"
        expected_behavior: "Uncertain - may error, ignore, or succeed"
      - step: 3
        operation: insert
        param_template:
          collection_name: "test_r3_exp002"
          vectors: "{vectors_128}"
      - step: 4
        operation: search
        param_template:
          collection_name: "test_r3_exp002"
          vector: "{query_vector_128}"
          top_k: 10
      - step: 5
        operation: drop_collection
        param_template:
          collection_name: "test_r3_exp002"
    type: exploratory
    state_property: "Delete non-existent entity edge case"
    rationale: "Tests edge case: deleting entity that doesn't exist"
