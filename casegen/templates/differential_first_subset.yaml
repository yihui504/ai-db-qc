# First Comparison Subset - Milvus vs seekdb (10 cases)
# Success rate: 6/10 = 60% on seekdb
# All cases validated and ready for cross-database comparison

templates:
  # ===== BASELINE (1 case) =====

  - template_id: subset-001-baseline
    operation: create_collection
    param_template:
      collection_name: "test_baseline"
      dimension: 128
      metric_type: "L2"
    validity_category: valid
    expected_validity: legal
    required_preconditions: []
    bucket: baseline
    rationale: "Baseline - both should succeed"

  # ===== CONFIRMED DIFFERENCES (1 case) =====

  - template_id: subset-002-drop-nonexistent
    operation: drop_collection
    param_template:
      collection_name: "nonexistent_for_drop"
    validity_category: pseudo_valid
    expected_validity: legal
    required_preconditions:
      - collection_exists
    bucket: behavioral_difference
    rationale: "seekdb succeeds on drop_nonexistent - check Milvus"

  # ===== BOUNDARY CASES (3 cases) =====

  - template_id: subset-003-topk-zero
    operation: search
    param_template:
      collection_name: "{collection}"
      vector: "{query_vector}"
      top_k: 0
    validity_category: invalid
    expected_validity: illegal
    bucket: parameter_boundary
    rationale: "Zero top_k - seekdb accepts, check Milvus"

  - template_id: subset-004-invalid-metric
    operation: create_collection
    param_template:
      collection_name: "test_invalid_metric"
      dimension: 128
      metric_type: "INVALID_METRIC"
    validity_category: invalid
    expected_validity: illegal
    bucket: parameter_boundary
    rationale: "Invalid metric - seekdb accepts, check Milvus"

  - template_id: subset-005-empty-metric
    operation: create_collection
    param_template:
      collection_name: "test_empty_metric"
      dimension: 128
      metric_type: ""
    validity_category: invalid
    expected_validity: illegal
    bucket: parameter_boundary
    rationale: "Empty metric - seekdb accepts, check Milvus"

  # ===== TYPE-2 COMPARISONS (2 cases) =====

  - template_id: subset-006-dim-zero
    operation: create_collection
    param_template:
      collection_name: "test_dim_zero"
      dimension: 0
      metric_type: "L2"
    validity_category: invalid
    expected_validity: illegal
    bucket: diagnostic_quality
    rationale: "Zero dimension - both reject, compare diagnostics"

  - template_id: subset-007-dim-negative
    operation: create_collection
    param_template:
      collection_name: "test_dim_negative"
      dimension: -1
      metric_type: "L2"
    validity_category: invalid
    expected_validity: illegal
    bucket: diagnostic_quality
    rationale: "Negative dimension - both reject, compare diagnostics"

  # ===== PRECONDITION TESTS (3 cases) =====

  - template_id: subset-008-search-nonexistent
    operation: search
    param_template:
      collection_name: "nonexistent_for_search"
      vector: "{query_vector}"
      top_k: 10
    validity_category: pseudo_valid
    expected_validity: legal
    required_preconditions:
      - collection_exists
    bucket: precondition_handling
    rationale: "Search nonexistent - both fail, compare diagnostics"

  - template_id: subset-009-delete-nonexistent
    operation: delete
    param_template:
      collection_name: "nonexistent_for_delete"
      ids: [1, 2, 3]
    validity_category: pseudo_valid
    expected_validity: legal
    required_preconditions:
      - collection_exists
    bucket: precondition_handling
    rationale: "Delete nonexistent - both fail, compare diagnostics"

  - template_id: subset-010-valid-search
    operation: search
    param_template:
      collection_name: "{collection}"
      vector: "{query_vector}"
      top_k: 10
    validity_category: valid
    expected_validity: legal
    required_preconditions:
      - collection_exists
    bucket: baseline
    rationale: "Valid search - baseline with setup"
